<h1>Liste des éditeurs</h1>

<form (submit)="addEditeur()" [formGroup]="formEditeur">

  <div class="mb-3 row">
    <label for="nom" class="col-sm-2 col-form-label">Nom</label>
    <div class="col-sm-10">
      <input type="text" class="form-control" id="nom"
      formControlName="nom"
      [class.is-invalid]="formNomCtrl.invalid" />
      <div *ngIf="formNomCtrl.hasError('required')" class="invalid-feedback">Le nom est obligatoire</div>
    </div>
  </div>

  <div class="mb-3 row">
    <label for="pays" class="col-sm-2 col-form-label">Pays</label>
    <div class="col-sm-10">
      <input type="text" class="form-control" id="pays"
      formControlName="pays" />
    </div>
  </div>

  <div>
    <input [disabled]="formEditeur.invalid" type="submit" class="btn btn-success" value="Ajouter" />
  </div>
</form>

<hr />

<table class="table table-striped">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nom</th>
      <th>Pays</th>
      <th></th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let editeur of editeurs$ | async">
      <td>{{ editeur.id }}</td>
      <td>
        <input type="text" class="form-control" #nomInput [value]="editeur.nom" />
      </td>
      <td>
        <input type="text" class="form-control" #paysInput [value]="editeur.pays" />
      </td>

      <td>
        <button class="btn btn-warning" (click)="updateEditeur(editeur.id, nomInput.value, paysInput.value)">Modifier</button>
        <button class="btn btn-danger" (click)="deleteEditeur(editeur)">Supprimer</button>
        <div *ngIf="updateId === editeur.id" class="valid-feedback d-block">Modification effectuée!</div>
      </td>

    </tr>
  </tbody>
</table>
