<h1>Liste des collections</h1>

<form (submit)="addCollec()" [formGroup]="formCollec">
    <div class="mb-3 row">
        <label for="nom" class="col-sm-2 col-form-label">Nom</label>
        <div class="col-sm-10">
            <input type="text" class="form-control" id="nom" formControlName="nom" [class.is-invalid]="formNomCtrl.invalid" />
            <div *ngIf="formNomCtrl.hasError('required')" class="invalid-feedback">Le nom est obligatoire</div>
        </div>
    </div>

    <div>
        <input [disabled]="formCollec.invalid" type="submit" class="btn btn-success" value="Ajouter" />
    </div>
</form>

<hr />

<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th></th>
        </tr>
    </thead>

    <tbody>
        <tr *ngFor="let collec of collec$ | async" >
            <td>{{ collec.id }}</td>
            <td>
                <input type="text" class="form-control" #nomInput [value]="collec.nom"/>
                <div *ngIf="updateId === collec.id" class="valid-feedback d-block">Modification effectuée !</div>
            </td>
            <td>
                <button class="btn btn-warning" (click)="updateCollec(collec.id, nomInput.value)">Modifier</button>
            </td>
            <td>
                <button class="btn btn-danger" (click)="deleteCollec(collec)">Supprimer</button>
            </td>
        </tr>
    </tbody>
</table>
